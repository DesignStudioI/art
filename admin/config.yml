backend:
  name: git-gateway
  branch: main # или master, проверь как называется твоя ветка в Git

media_folder: "assets/images/merch" # Куда CMS будет сохранять картинки
public_folder: "/assets/images/merch" # Какой путь прописывать в YAML

collections:
  - name: "merch"
    label: "Прилавок (Товары)"
    folder: "_data" # Где лежит файл
    extension: "yml"
    create: true # Разрешить добавлять новые товары
    slug: "{{title}}"
    files:
      - label: "Список товаров"
        name: "merch_list"
        file: "_data/merch.yml"
        fields:
          - label: "Товары"
            name: "merch"
            widget: "list"
            fields:
              - {label: "ID (slug)", name: "slug", widget: "string"}
              - {label: "Название", name: "title", widget: "string"}
              - {label: "Цена", name: "price", widget: "string"}
              - {label: "Картинка", name: "image", widget: "image"}